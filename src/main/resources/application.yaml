server:
  port: 9092

spring:
  application:
    name: cursor-scroll-pagination-spring-boot

  datasource:
    url: jdbc:mysql://localhost:3306/cursor_scroll_pagination?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
